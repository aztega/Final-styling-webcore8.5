<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <section class="sidebar">
      <header class="side-bar-header">
        <div class="logo-close-icon">
          <img
            class="icons"
            src="./img/close Icon Container.png"
            alt="close-icon"
          />
          <img src="./img/Logo Group.png" alt="cps logo" />
        </div>
        <div class="icons check-status">
          <img src="./img/Search Icon Container.png" alt="check status icon" />
        </div>
      </header>
      <div class="side-bar-menu">
        <div class="active"></div>
        <ul>
          <li><a href="#">Equipment repair</a></li>
          <li><a href="#">Services and solutions</a></li>
          <li><a href="#">Corporate clients</a></li>
          <li><a href="#">Equipment sellers</a></li>
          <li><a href="#">Partners</a></li>
          <li><a href="#">Manufacturers</a></li>
          <li><a href="#">Our service centres</a></li>
          <li><a href="#">Contacts</a></li>
        </ul>
      </div>
      <div class="side-menu-footer">
        <div class="footer-icons">
          <img
            class="icons"
            src="./img/Call Icon Container.png"
            alt="call icon"
          />
          <img
            class="icons"
            src="./img/Chat Icon Container.png"
            alt="chat icon"
          />
          <img
            class="icons"
            src="./img/Profile Icon Container.png"
            alt="profile icon"
          />
        </div>
        <p>mail@cps.com</p>
        <p>8 800 890 8900</p>
        <div class="language">
          <a href="#">RU</a>
          <a href="#">EN</a>
          <a href="#">CH</a>
        </div>
      </div>
    </section>
  </body>
</html>
